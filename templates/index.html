<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能文章生成助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .platform-info {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-weight: 600;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        
        @media (max-width: 1000px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        .card h2 {
            color: #333;
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .form-group input[type="text"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-group input[type="text"]:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .hot-list {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .hot-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 15px;
        }
        
        .hot-item:last-child {
            border-bottom: none;
        }
        
        .hot-rank {
            width: 30px;
            height: 30px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #666;
            flex-shrink: 0;
        }
        
        .hot-rank.top-3 {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #d63384;
        }
        
        .hot-content {
            flex: 1;
            min-width: 0;
        }
        
        .hot-title {
            color: #333;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .hot-title:hover {
            color: #667eea;
        }
        
        .hot-meta {
            font-size: 0.85rem;
            color: #999;
            margin-top: 4px;
        }
        
        .hot-category {
            background: #e7f3ff;
            color: #1976d2;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .style-preview {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .style-preview h3 {
            margin-bottom: 10px;
            color: #555;
        }
        
        .style-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .style-tag {
            background: #e7f3ff;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .article-output {
            background: #fafafa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.8;
        }
        
        .article-output h1,
        .article-output h2 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .article-output h1 {
            font-size: 1.5rem;
        }
        
        .article-output h2 {
            font-size: 1.2rem;
            margin-top: 20px;
        }
        
        .action-bar {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .toast.success {
            background: #28a745;
        }
        
        .toast.error {
            background: #dc3545;
        }
        
        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .tab-container {
            margin-bottom: 20px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 5px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1rem;
            color: #666;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>智能文章生成助手</h1>
            <p>一键获取热门话题，智能生成优质文章</p>
            <div class="platform-info">
                📱 当前数据源：微博热搜
            </div>
        </div>
        
        <div class="main-grid">
            <div class="card">
                <h2>热门话题榜</h2>
                <div class="refresh-btn">
                    <button class="btn" id="refreshHotBtn" onclick="loadHotSearch()">
                        🔄 刷新热搜
                    </button>
                </div>
                <div class="hot-list" id="hotList">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>正在加载热门话题...</p>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>文章生成器</h2>
                
                <div class="tab-container">
                    <div class="tab-buttons">
                        <button class="tab-btn active" onclick="switchTab('simple')">简单模式</button>
                        <button class="tab-btn" onclick="switchTab('advanced')">高级模式</button>
                    </div>
                    
                    <div class="tab-content active" id="simple-tab">
                        <div class="form-group" id="selectedTopicDisplay" style="display: none;">
                            <label>当前选中主题</label>
                            <div style="padding: 12px 16px; background: #f8f9fa; border-radius: 8px; font-weight: 600; color: #667eea;" id="selectedTopicText">-</div>
                        </div>
                        
                        <div class="form-group">
                            <label for="categorySelect">主题分类</label>
                            <select id="categorySelect">
                                <option value="育儿">育儿</option>
                                <option value="母婴">母婴</option>
                                <option value="求职">求职</option>
                                <option value="星座">星座</option>
                                <option value="默认">通用</option>
                            </select>
                        </div>
                        
                        <button class="btn" id="simpleGenerateBtn" onclick="generateSimpleArticle()">
                            ✨ 生成文章
                        </button>
                    </div>
                    
                    <div class="tab-content" id="advanced-tab">
                        <div class="form-group" id="selectedTopicDisplayAdvanced" style="display: none;">
                            <label>当前选中主题</label>
                            <div style="padding: 12px 16px; background: #f8f9fa; border-radius: 8px; font-weight: 600; color: #667eea;" id="selectedTopicTextAdvanced">-</div>
                        </div>
                        
                        <div class="form-group">
                            <label for="articleUrl">参考文章链接</label>
                            <input type="text" id="articleUrl" placeholder="粘贴文章链接，我们将分析其写作风格...">
                        </div>
                        
                        <button class="btn btn-secondary" id="parseBtn" onclick="parseArticle()">
                            🔍 分析文章风格
                        </button>
                        
                        <div id="stylePreview" class="style-preview" style="display: none;">
                            <h3>分析结果</h3>
                            <div class="style-tags" id="styleTags"></div>
                        </div>
                        
                        <div class="form-group" style="margin-top: 20px;">
                            <label for="categorySelectAdvanced">主题分类</label>
                            <select id="categorySelectAdvanced">
                                <option value="育儿">育儿</option>
                                <option value="母婴">母婴</option>
                                <option value="求职">求职</option>
                                <option value="星座">星座</option>
                                <option value="默认">通用</option>
                            </select>
                        </div>
                        
                        <button class="btn" id="advancedGenerateBtn" onclick="generateAdvancedArticle()">
                            ✨ 按风格生成文章
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card" style="margin-top: 25px;">
            <h2>生成结果</h2>
            <div id="articleOutput" class="article-output">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14,2 14,8 20,8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10,9 9,9 8,9"></polyline>
                    </svg>
                    <p>生成的文章将显示在这里</p>
                    <p style="font-size: 0.9rem; margin-top: 5px;">点击热门话题可快速填入主题</p>
                </div>
            </div>
            <div class="action-bar">
                <button class="btn btn-success" id="copyBtn" onclick="copyArticle()" disabled>
                    📋 一键复制
                </button>
                <button class="btn btn-secondary" id="clearBtn" onclick="clearArticle()">
                    🗑️ 清空
                </button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let currentArticle = '';
        let currentStyleInfo = null;
        let currentTopic = '';
        
        document.addEventListener('DOMContentLoaded', function() {
            loadHotSearch();
        });
        
        async function loadHotSearch() {
            const hotList = document.getElementById('hotList');
            const refreshBtn = document.getElementById('refreshHotBtn');
            
            refreshBtn.disabled = true;
            hotList.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载热门话题...</p>
                </div>
            `;
            
            try {
                const response = await fetch('/api/hot-search?top_n=20');
                const result = await response.json();
                
                if (result.success) {
                    renderHotList(result.data);
                } else {
                    hotList.innerHTML = `<div class="empty-state"><p>加载失败: ${result.error}</p></div>`;
                }
            } catch (error) {
                hotList.innerHTML = `<div class="empty-state"><p>网络错误，请稍后重试</p></div>`;
            }
            
            refreshBtn.disabled = false;
        }
        
        function renderHotList(data) {
            const hotList = document.getElementById('hotList');
            
            if (!data || data.length === 0) {
                hotList.innerHTML = `<div class="empty-state"><p>暂无数据</p></div>`;
                return;
            }
            
            let html = '';
            data.forEach(item => {
                const isTop3 = item.rank <= 3;
                const rankClass = isTop3 ? 'hot-rank top-3' : 'hot-rank';
                const hotValue = formatHotValue(item.hot_value);
                
                html += `
                    <div class="hot-item">
                        <div class="${rankClass}">${item.rank}</div>
                        <div class="hot-content">
                            <a href="${item.url}" target="_blank" class="hot-title">
                                ${item.title}
                            </a>
                            <div class="hot-meta">
                                ${item.category ? `<span class="hot-category">${item.category}</span>` : ''}
                                热度: ${hotValue}
                            </div>
                        </div>
                        <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;" onclick="selectTopic('${item.title}')">
                            选择
                        </button>
                    </div>
                `;
            });
            
            hotList.innerHTML = html;
        }
        
        function formatHotValue(value) {
            if (!value) return '未知';
            if (value >= 100000000) {
                return (value / 100000000).toFixed(1) + '亿';
            }
            if (value >= 10000) {
                return (value / 10000).toFixed(1) + '万';
            }
            return value.toString();
        }
        
        function selectTopic(title) {
            currentTopic = title;
            
            const simpleDisplay = document.getElementById('selectedTopicDisplay');
            const simpleText = document.getElementById('selectedTopicText');
            const advancedDisplay = document.getElementById('selectedTopicDisplayAdvanced');
            const advancedText = document.getElementById('selectedTopicTextAdvanced');
            
            simpleDisplay.style.display = 'block';
            simpleText.textContent = title;
            advancedDisplay.style.display = 'block';
            advancedText.textContent = title;
            
            showToast('已选择主题: ' + title);
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
        }
        
        async function parseArticle() {
            const url = document.getElementById('articleUrl').value.trim();
            const parseBtn = document.getElementById('parseBtn');
            const stylePreview = document.getElementById('stylePreview');
            
            if (!url) {
                showToast('请输入文章链接', 'error');
                return;
            }
            
            parseBtn.disabled = true;
            parseBtn.textContent = '分析中...';
            
            try {
                const response = await fetch('/api/parse-article', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentStyleInfo = result.data;
                    renderStylePreview(result.data);
                    stylePreview.style.display = 'block';
                    showToast('风格分析完成');
                } else {
                    showToast('分析失败: ' + result.error, 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
            
            parseBtn.disabled = false;
            parseBtn.textContent = '🔍 分析文章风格';
        }
        
        function renderStylePreview(style) {
            const styleTags = document.getElementById('styleTags');
            
            let tags = [];
            tags.push(`<span class="style-tag">来源: ${style.source}</span>`);
            tags.push(`<span class="style-tag">类型: ${style.style_type}</span>`);
            tags.push(`<span class="style-tag">句式: ${style.sentence_style}</span>`);
            tags.push(`<span class="style-tag">段落: ${style.paragraph_style}</span>`);
            
            if (style.has_emoji) tags.push(`<span class="style-tag">✨ 含表情</span>`);
            if (style.has_hashtag) tags.push(`<span class="style-tag"># 含话题标签</span>`);
            if (style.has_list) tags.push(`<span class="style-tag">📋 列表格式</span>`);
            
            styleTags.innerHTML = tags.join('');
        }
        
        async function generateSimpleArticle() {
            const topic = currentTopic;
            const category = document.getElementById('categorySelect').value;
            
            if (!topic) {
                showToast('请先从热门话题榜选择一个主题', 'error');
                return;
            }
            
            await generateArticle(topic, category, null);
        }
        
        async function generateAdvancedArticle() {
            const topic = currentTopic;
            const category = document.getElementById('categorySelectAdvanced').value;
            
            if (!topic) {
                showToast('请先从热门话题榜选择一个主题', 'error');
                return;
            }
            
            if (!currentStyleInfo) {
                showToast('请先分析参考文章风格', 'error');
                return;
            }
            
            await generateArticle(topic, category, currentStyleInfo);
        }
        
        async function generateArticle(topic, category, styleInfo) {
            const simpleBtn = document.getElementById('simpleGenerateBtn');
            const advancedBtn = document.getElementById('advancedGenerateBtn');
            const output = document.getElementById('articleOutput');
            
            simpleBtn.disabled = true;
            advancedBtn.disabled = true;
            
            output.innerHTML = `
                <div class="loading" style="padding: 60px 20px;">
                    <div class="spinner"></div>
                    <p>正在生成文章，请稍候...</p>
                </div>
            `;
            
            try {
                const response = await fetch('/api/generate-article', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic: topic,
                        category: category,
                        style_info: styleInfo
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentArticle = result.data.content;
                    renderArticle(result.data);
                    document.getElementById('copyBtn').disabled = false;
                    showToast('文章生成成功');
                } else {
                    output.innerHTML = `<div class="empty-state"><p>生成失败: ${result.error}</p></div>`;
                }
            } catch (error) {
                output.innerHTML = `<div class="empty-state"><p>网络错误，请稍后重试</p></div>`;
            }
            
            simpleBtn.disabled = false;
            advancedBtn.disabled = false;
        }
        
        function renderArticle(data) {
            const output = document.getElementById('articleOutput');
            
            let html = '';
            const lines = data.content.split('\n');
            
            lines.forEach(line => {
                if (line.startsWith('# ')) {
                    html += `<h1>${line.substring(2)}</h1>`;
                } else if (line.startsWith('## ')) {
                    html += `<h2>${line.substring(3)}</h2>`;
                } else if (line.trim()) {
                    html += `<p>${line}</p>`;
                } else {
                    html += '<br>';
                }
            });
            
            output.innerHTML = html;
        }
        
        async function copyArticle() {
            if (!currentArticle) {
                showToast('没有可复制的内容', 'error');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(currentArticle);
                showToast('已复制到剪贴板', 'success');
            } catch (error) {
                const textarea = document.createElement('textarea');
                textarea.value = currentArticle;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板', 'success');
            }
        }
        
        function clearArticle() {
            currentArticle = '';
            document.getElementById('articleOutput').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14,2 14,8 20,8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10,9 9,9 8,9"></polyline>
                    </svg>
                    <p>生成的文章将显示在这里</p>
                    <p style="font-size: 0.9rem; margin-top: 5px;">点击热门话题可快速填入主题</p>
                </div>
            `;
            document.getElementById('copyBtn').disabled = true;
            showToast('已清空');
        }
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
